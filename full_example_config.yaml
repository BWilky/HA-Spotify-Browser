# Spotify Browser Card - Comprehensive Configuration Example
# Copy relevant sections to your Lovelace configuration.

type: custom:spotify-browser-card

# --- Core Settings ---
# The main Spotify Media Player entity (Required if spotify_accounts not used)
entity: media_player.spotify_user 

# --- Home On Exit Behavior ---
# Defines behavior when you close and reopen the browser.
# Options:
#   true (Default) -> Always resets to Home screen.
#   false          -> Remembers last page and position forever (until cache clears).
#   timeout: N     -> Remembers state for N seconds, then resets to Home.
homeonexit:
  timeout: 300 # 5 minutes


device_playback:
  # Device Manager (Optional)
  # Persistent device list, sorting, and defaults using an input_select helper.
  helper: input_select.spotify_browser_device_manager

  # Default Device for Idle Playback
  # REMOVED: Managed via Device Manager (input_select) or interactive prompt.

  # Volume Configuration
  volume:
    # Option 1: Simple Default (Scalar)
    # default: 15  # Using this implies no time-based rules
    
    # Option 2: Advanced (Time-Based Rules)
    default:
      fallback: 25 # Used if no rules match
      rules:
        - start: '09:00'
          end: '17:00'
          level: '35' # Daytime volume
        - start: '22:00'
          end: '07:00'
          level: '15' # Quiet at night
         
    # Slider Settings
    slider:
      rate_control: true # Throttle volume updates (Default: true)
      optimistic: true   # Optimistic UI updates (Default: true)


# --- Queue & Mini Player --- 

queue:
  - desktop:
      # Open the queue sidebar automatically when browser opens?
      open_init: true
      
      # Customize mini-player buttons (true/false)
      miniplayer:
        shuffle: true
        previous: true
        next: true
        like: true   # Heart button
        volume: true # Volume slider
        device: true # Device picker

# --- Cache & Performance ---
# Max number of pages to keep in memory (default 10)
# Uses Least-Recently-Used (LRU) eviction policy.
cache_size: 15

# Performance profile (default 'auto'):
#   auto - best-effort: weak hardware (low RAM/CPU cores) gets the lite profile
#   high - full visuals (aliases: full, max)
#   low  - lite profile: forces blur off + trims decorative motion (alias: lite)
# The "lite" profile disables backdrop blur, skips the scroll parallax, and
# skips the Liked Songs genre-pill lookups. Set 'low' explicitly for a known
# slow tablet (auto can't always detect iPads).
performance: auto

# --- Animations ---
# Customize the look and feel of transitions.
animations:
  page_transition: fade # 'fade', 'slide', 'none'
  browser_open: fade
  blur: true # Set to false for opaque background (performance boost)

# --- Accounts (Multi-User Support) ---
# Adds a user switcher menu.
# A profile avatar is shown top-left on the home screen. With more than one
# account, tapping it opens a slide-up switcher (the active account is badged).
# `image` is optional — if omitted, the live Spotify profile picture is used,
# falling back to a default avatar icon.
spotify_accounts:
  - name: "Bryce"
    entity: media_player.spotify_bryce
    default: true
    hash: "#bryce" # URL hash to open this account directly
    image: "/local/spotify/bryce.jpg" # optional avatar override
  - name: "Alice"
    entity: media_player.spotify_alice
    hash: "#alice"

# --- Persistent Storage (Required for pinning) ---
# Pinned items and saved device settings persist via a Home Assistant
# trigger-template sensor (set it up with the YAML below). By default the card
# uses 'sensor.spotify_browser_data' and the 'spotify_browser_store_data' event.
# Override these if that entity_id was already taken (e.g. HA assigned your
# sensor 'sensor.spotify_browser_data_2') or you renamed the sensor/event.
# Without this sensor there is no pinning (there is no per-device fallback).
#
# write_script (Optional): lets NON-ADMIN / guest users edit pins. Saving fires
# a HA event, which only admins may do — so by default guests can SEE pins but
# can't add/remove/reorder them (the pin and edit buttons are hidden). Create a
# middle-man script that fires the event for them (it can validate the payload
# first) and point the card at it here, and guests get full pin editing too.
# Admins always fire the event directly and ignore this. See the script below.
storage:
  sensor_entity: sensor.spotify_browser_data
  event_type: spotify_browser_store_data
  # write_script: script.spotify_browser_store

# Trigger-template sensor + middle-man script to paste into your HA config.
#
# configuration.yaml (or template.yaml):
#   template:
#     - trigger:
#         - platform: event
#           event_type: spotify_browser_store_data
#       sensor:
#         - name: Spotify Browser Data
#           unique_id: spotify_browser_data
#           state: "{{ now().timestamp() | int }}"
#           attributes:
#             # Store as JSON so nested item names (incl. apostrophes) round-trip
#             # deterministically regardless of HA's native-type rendering.
#             data: "{{ trigger.event.data.data | to_json }}"
#
# scripts.yaml (validates, then fires the event guests aren't allowed to fire):
#   spotify_browser_store:
#     alias: Spotify Browser Store Data
#     mode: queued
#     fields:
#       data:
#         description: Full data object to persist
#     sequence:
#       - condition: template
#         value_template: "{{ data is mapping }}"   # reject anything not an object
#       - event: spotify_browser_store_data
#         event_data:
#           data: "{{ data }}"

# --- Home Screen Configuration ---
homescreen:
  cache: true
  expiry: 60 # Minutes before refreshing home data

  # Pinned Items (Sticky)
  # Requires an input_select entity in Home Assistant to store the pinned items.
  sticky:
    helper: input_select.spotify_pinned_items
    limit: 10 # Optional, defaults to 10
  
  # Section Sorting & Visibility
  # Define the order of sections. Omit items to hide them.
  # Available options: pinned, recently played, followed_artists, favourite_playlists, favourite_albums, made_for_you
  sort:
    - pinned
    - recently played
    - made_for_you
    - favourite_playlists
    - followed_artists
    - favourite_albums
   
# --- Advanced Features ---
advanced:
  # Radio Generator (requires external provider)
  radio_track:
    enabled: true
    provider: "lastfm"
    limit: 30
    dontstopthemusic: true

  # Similar Artists logic
  similar_artists:
    provider: "lastfm"
    limit: 10

# --- External Providers ---
external_providers:
  lastfm:
    api_key: "YOUR_LASTFM_API_KEY"

# --- Auto Close ---
auto_close_seconds: 0
closeondisconnect: true
custom_hash: "#spotify-browser"
# Open straight to the mobile Now Playing view by appending `-now-playing` to
# any trigger hash (e.g. "#spotify-browser-now-playing") or by firing the
# `spotify-browser-open-now-playing` window event. The now-playing surface sits
# over Spotify home, so dismissing it lands on home. Falls back to a normal open
# if nothing is playing (and on desktop, which has a persistent now-playing rail).

# --- Desktop Styling ---
# Controls the size and behavior of the popup on desktop screens (>768px).
desktop_style:
  # Option 1: Fixed Sizing
  # mode: fixed
  # width: 1000px
  # height: 700px

  # Option 2: Fullscreen with Margin
  fullscreen: true
  margin: 32px
  # You can also use individual margins (overrides global margin)
  # margin_top: 50px
  # margin_left: 10%
  # margin_right: 0
  # margin_bottom: 50px
